apiVersion: v1
kind: ConfigMap
metadata:
  name: t28bet-config
  namespace: t28bet
data:
  PORT: "3001"
  LOG_LEVEL: "info"
  AWS_REGION: "us-east-1"
  JWT_EXPIRES_IN: "24h"
  # SQS/SNS endpoints: empty means real AWS.
  # Terraform will provide queue URLs and topic ARNs via Secrets (see secret.yaml).
