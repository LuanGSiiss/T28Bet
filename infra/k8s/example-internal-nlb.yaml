apiVersion: v1
kind: Namespace
metadata:
  name: lab-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-api
  namespace: lab-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: internal-api
  template:
    metadata:
      labels:
        app: internal-api
    spec:
      containers:
        - name: internal-api
          image: public.ecr.aws/docker/library/nginx:stable
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: internal-api
  namespace: lab-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internal
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
spec:
  type: LoadBalancer
  selector:
    app: internal-api
  ports:
    - port: 80
      targetPort: 80
